<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股損益計算機</title>
 
<style>
body {
  font-family: Arial;
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 15px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  cursor: pointer;
  margin-bottom: 10px;
}

#calcBtn {
  background: #333;
  color: white;
}

#clearBtn {
  background: #ccc;
}

button:hover {
  opacity: 0.8;
}

h2, h3 {
  text-align: center;
}
</style>
</head>

<body>

<h2>台股損益計算機</h2>

<label>類型：</label>
<select id="type">
  <option value="stock">股票</option>
  <option value="daytrade">當沖</option>
  <option value="etf">ETF</option>
</select>

<label>買入價格：</label>
<input type="number" id="buy" step="0.01">

<label>賣出價格：</label>
<input type="number" id="sell" step="0.01">

<label>單位：</label>
<select id="unit">
  <option value="lot">1張 (1000股)</option>
  <option value="share">1股</option>
</select>

<button id="calcBtn" onclick="calc()">計算</button>
<button id="clearBtn" onclick="clearAll()">清除</button>

<hr>

<h3>結果</h3>
<div id="result"></div>

<script>
function calc() {
  const type = document.getElementById("type").value;
  const buy = parseFloat(document.getElementById("buy").value);
  const sell = parseFloat(document.getElementById("sell").value);
  const unit = document.getElementById("unit").value;

  if (isNaN(buy) || isNaN(sell)) {
    alert("請輸入正確價格");
    return;
  }

  const qty = (unit === "lot") ? 1000 : 1;

  const buyCost = buy * qty;
  const sellValue = sell * qty;

  let buyFee = Math.max(buyCost * 0.001425, 1);
  let sellFee = Math.max(sellValue * 0.001425, 1);

  let taxRate = 0;
  if (type === "stock") taxRate = 0.003;
  if (type === "etf") taxRate = 0.001;
  if (type === "daytrade") taxRate = 0.0015;

  let tax = sellValue * taxRate;

  const profit = sellValue - buyCost - buyFee - sellFee - tax;

  document.getElementById("result").innerHTML = `
    買入成本：${buyCost.toFixed(2)}<br>
    賣出金額：${sellValue.toFixed(2)}<br>
    買入手續費：${buyFee.toFixed(2)}<br>
    賣出手續費：${sellFee.toFixed(2)}<br>
    證交稅：${tax.toFixed(2)}<br>
    <h3>損益：${profit.toFixed(2)}</h3>
  `;
}

function clearAll() {
  document.getElementById("buy").value = "";
  document.getElementById("sell").value = "";
  document.getElementById("type").value = "stock";
  document.getElementById("unit").value = "lot";
  document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
